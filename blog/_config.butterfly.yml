# --------------------------------------
# Hexo Butterfly Theme FULL CONFIG
# --------------------------------------

nav:
  display_post_title: true
  fixed: false
  search: true
  search_placeholder: 在此搜索文章
menu:
  首页: / || fas fa-home
  时间轴: /archives/ || fas fa-archive
  留言板: /message/ || fas fa-comment
  照片: /Gallery/ || fas fa-images    
  友链: /link/ || fas fa-link
  关于: /about/ || fas fa-heart

# --------------------------------------
# 搜索
# --------------------------------------
search:
  use: local_search
  placeholder: 在此输入关键词搜索文章

# --------------------------------------
# 侧边栏
# --------------------------------------
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true

  card_author:
    enable: true
    description: "站主：谢恩"
    button:
      enable: true
      icon: fab fa-github
      text: Github
      link: https://github.com/shane00413-wq

  card_announcement:
    enable: true
    content: |
      自我介绍：<br>
      我是谢恩，是一个搞机圈玩家。<br>
      会在这里分享各种搞机相关文章 <br> <br>
      联系方式：<br>
      QQ: 3514143296<br>
      Telegram: Shane_0413

  card_recent_post:
    enable: true
    limit: 5
    sort: date

  card_categories:
    enable: true
    limit: 8

  card_tags:
    enable: true
    limit: 40
    orderby: random

  card_archives:
    enable: true
    type: monthly
    limit: 8

  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true

# --------------------------------------
# 代码块
# --------------------------------------
code_blocks:
  theme: light
  copy: true
  language: true
  shrink: false

# --------------------------------------
# 图片
# --------------------------------------
favicon: /img/favicon.png

avatar:
  img: /img/shane.png

disable_top_img: false
index_img: null
subtitle:
  enable: true
  effect: true
  typed_option:
    typeSpeed: 80
    backSpeed: 40
    backDelay: 1200
    loop: true
  source: false
  sub:
    - "顶部导航栏可快速访问首页、友链、关于页和留言板"
    - "侧边栏可查看标签、分类、归档和最新文章"
    - "你可以在留言板发布留言或建议"
    - "移动端可点击右上角三条横杠展开菜单"
    - "往下滑动即可看到最新帖子和文章列表"
    - "这里是我的技术博客与折腾笔记"
    - "记录手机、脚本、网络、工具的实用教程"
    - "侧边栏里有标签、分类和归档方便查找"
    - "每篇文章都尽量写清楚原理与操作步骤"
    - "希望你在这里找到有用的信息和灵感"
    - "如果想看更多内容，请继续下拉浏览"
    - "博客内容会持续更新，欢迎常来看看"

# --------------------------------------
# 文章信息
# --------------------------------------
post_meta:
  page:
    date_type: created
    categories: true
  post:
    date_type: both
    categories: true
    tags: true

index_layout: 1

index_post_content:
  method: 3
  length: 500

# --------------------------------------
# TOC
# --------------------------------------
toc:
  post: true
  number: true
  scroll_percent: true

# --------------------------------------
# Footer
# --------------------------------------
footer:
  owner:
    enable: true
    since: 2025
  copyright:
    enable: true
    version: true

# --------------------------------------
# 相关文章
# --------------------------------------
related_post:
  enable: true
  limit: 6

post_pagination: 1

# --------------------------------------
# 暗黑模式
# --------------------------------------
darkmode:
  enable: true
  button: true
  autoChangeMode: false

# --------------------------------------
# 复制
# --------------------------------------
copy:
  enable: true

# --------------------------------------
# 浏览统计
# --------------------------------------
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# --------------------------------------
# 评论系统（你自己填API）
# --------------------------------------
comments:
  use: Giscus
  text: true
  lazyload: false
  count: false
giscus:
  repo: "shane00413-wq/shaneblog-giscus"
  repo_id: "R_kgDOTE5qdw"
  category: "General"
  category_id: "DIC_kwDOTE5qd84C_3b_"
  mapping: pathname
  strict: 0
  reactions_enabled: 1
  emit_metadata: 0
  input_position: bottom
  theme: preferred_color_scheme
  lang: zh-CN
social:
  fas fa-envelope: mailto:shane00413@gmail.com || Email
  fas fa-rss: /atom.xml || RSS